services:
  mysql:
    image: mysql:8.0
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: shopdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin1234
    volumes:
      - mysql-compose-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uadmin -padmin1234 --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  api-server:
    build:
      context: ./api_server
    environment:
      MYSQL_HOST: mysql
    ports:
      - "8080:80"
    volumes:
      - nginx-logs:/var/log/nginx
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1/health', timeout=2).read()\""]
      interval: 5s
      timeout: 5s
      retries: 30

  traffic-generator:
    build:
      context: ..
      dockerfile: Lab01/traffic_generator/Dockerfile
    environment:
      API_BASE_URL: api-server:80
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?Set KAFKA_BOOTSTRAP_SERVERS in .env}
      DOMAIN_ID: local-domain
      PROJECT_ID: local-project
      CREDENTIAL_ID: local-credential-id
      CREDENTIAL_SECRET: local-credential-secret
      TOPIC_NAME: test-topic
      SUB_NAME: test-pull-sub
      TOPIC_NAME_MK: log-topic
      OBJECT_STORAGE_SUBSCRIPTION_NAME: log-obj-sub
      OBJECT_STORAGE_BUCKET: pubsub-log-bucket
      PUBSUB_ENDPOINT: http://pubsub-unused
    depends_on:
      api-server:
        condition: service_healthy
    command: ["python", "Lab02/pubsub/traffic_generator.py", "--mode", "continuous"]

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.23
    environment:
      LOGSTASH_KAFKA_ENDPOINT: ${LOGSTASH_KAFKA_ENDPOINT:?Set LOGSTASH_KAFKA_ENDPOINT in .env}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:?Set KAFKA_SECURITY_PROTOCOL in .env}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:?Set KAFKA_SASL_MECHANISM in .env}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:?Set KAFKA_SASL_USERNAME in .env}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:?Set KAFKA_SASL_PASSWORD in .env}
      LS_JAVA_OPTS: -Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro

  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.23
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      logstash:
        condition: service_started
      api-server:
        condition: service_healthy

  kafka-connect:
    build:
      context: ./kafka_connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?Set KAFKA_BOOTSTRAP_SERVERS in .env}
      CONNECT_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:?Set KAFKA_SECURITY_PROTOCOL in .env}
      CONNECT_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:?Set KAFKA_SASL_MECHANISM in .env}
      CONNECT_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_SASL_USERNAME:?Set KAFKA_SASL_USERNAME in .env}' password='${KAFKA_SASL_PASSWORD:?Set KAFKA_SASL_PASSWORD in .env}';"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: nginx-s3-sink-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs-nginx-s3
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets-nginx-s3
      CONNECT_STATUS_STORAGE_TOPIC: connect-statuses-nginx-s3
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      BUCKET_NAME: ${BUCKET_NAME:?Set BUCKET_NAME in .env}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:?Set OBJECT_STORAGE_ENDPOINT in .env}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:?Set OBJECT_STORAGE_REGION in .env}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?Set OBJECT_STORAGE_ACCESS_KEY in .env}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?Set OBJECT_STORAGE_SECRET_KEY in .env}

  connector-init:
    image: curlimages/curl:8.10.1
    depends_on:
      - kafka-connect
    volumes:
      - ./kafka_connect/connectors:/connectors:ro
      - ./kafka_connect/register-connectors.sh:/register-connectors.sh:ro
    command: ["/bin/sh", "/register-connectors.sh"]
    restart: "no"

volumes:
  mysql-compose-data:
  nginx-logs:
