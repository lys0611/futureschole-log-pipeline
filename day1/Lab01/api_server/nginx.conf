user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    map $request_body $prod_pid {
        "~(?:^|&)(?:id|product_id)=(?<v>[^&]+)" $v;
        default "";
    }

    log_format custom_json escape=json '{
        "timestamp":"$time_local",
        "remote_addr":"$remote_addr",
        "request":"$request_method $uri $server_protocol",
        "status":"$status",
        "body_bytes_sent":"$body_bytes_sent",
        "http_referer":"$http_referer",
        "session_id":"$cookie_session_id",
        "user_id":"$cookie_user_id",
        "request_time":"$request_time",
        "upstream_response_time":"$upstream_response_time",
        "endpoint":"$uri",
        "method":"$request_method",
        "query_params":"$args",
        "product_id":"$arg_id$prod_pid",
        "host":"$host"
    }';

    server {
        listen 80;
        server_name _;

        access_log off;
        error_log /var/log/nginx/flask_app_error.log;

        location = / {
            if ($args) {
                return 403;
            }
            access_log /var/log/nginx/flask_app_access.log custom_json;
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(health|push-subscription|push-messages|add_user|delete_user|login|logout|products|product|categories|category|search|cart/add|cart/remove|cart/view|checkout|checkout_history|add_review|error)$ {
            access_log /var/log/nginx/flask_app_access.log custom_json;
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            return 403;
        }
    }
}
