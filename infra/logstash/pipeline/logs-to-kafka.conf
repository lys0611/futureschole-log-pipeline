input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
    remove_field => ["message"]
  }

  if "_jsonparsefailure" in [tags] {
    drop { }
  }

  if [timestamp] {
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
      target => "timestamp"
    }
    ruby {
      code => "event.set('timestamp', event.get('timestamp').time.strftime('%Y-%m-%d %H:%M:%S'))"
    }
  }

  mutate {
    convert => {
      "status" => "integer"
      "body_bytes_sent" => "integer"
      "request_time" => "float"
      "upstream_response_time" => "float"
    }
  }

  mutate {
    remove_field => [
      "@version", "@timestamp", "agent", "cloud", "ecs", "input", "log", "tags"
    ]
  }
}

output {
  kafka {
    bootstrap_servers => "${LOGSTASH_KAFKA_ENDPOINT}"
    security_protocol => "${KAFKA_SECURITY_PROTOCOL}"
    sasl_mechanism => "${KAFKA_SASL_MECHANISM}"
    sasl_jaas_config => "org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_SASL_USERNAME}' password='${KAFKA_SASL_PASSWORD}';"
    topic_id => "nginx-topic"
    codec => json
  }
}
